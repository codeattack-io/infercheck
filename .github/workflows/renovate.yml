name: Renovate

on:
  schedule:
    - cron: "0 7 * * 1" # Every Monday at 07:00 UTC (09:00 Amsterdam)
  # Triggered when a checkbox is ticked in the Renovate Dependency Dashboard issue
  issues:
    types: [edited]
  # Triggered when the rebase checkbox is ticked in a Renovate PR
  pull_request_target:
    types: [edited]
  # Allows manual/automated ad-hoc trigger
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Override default log level"
        required: false
        default: "info"
        type: string
      overrideSchedule:
        description: "Override all schedules"
        required: false
        default: "false"
        type: string

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    name: Renovate dependency updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate Renovate JSON
        run: jq type .github/renovate.json
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.8
        env:
          # Repository taken from variable to keep configuration file generic
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Onboarding not needed for self hosted
          RENOVATE_ONBOARDING: "false"
          # Username for GitHub authentication (should match GitHub App name + [bot])
          RENOVATE_USERNAME: "ca-renovatebot[bot]"
          # Git commit author used, must match GitHub App
          RENOVATE_GIT_AUTHOR: "ca-renovatebot <274336062+ca-renovatebot[bot]@users.noreply.github.com>"
          # Use GitHub API to create commits (this allows for signed commits from GitHub App)
          RENOVATE_PLATFORM_COMMIT: "true"
          # Override schedule if set
          RENOVATE_FORCE: ${{ github.event.inputs.overrideSchedule == 'true' && '{''schedule'':null}' || '' }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: .github/renovate.json
