# CI — Pull Request Checks
#
# Two jobs:
#
#   check  — always runs (including fork PRs)
#            Validates provider JSON data and lints source code.
#            No secrets required.
#
#   build  — skipped for fork PRs (they have no access to secrets)
#            Builds the Next.js app, which requires a real DATABASE_URL
#            because sitemap generation queries the DB at build time.
#            Uses DATABASE_URL_DEV secret (a Neon dev/CI branch).

name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validate + Lint ────────────────────────────────────────────────────────
  # Runs for all PRs including forks. No secrets needed.
  check:
    name: Validate · Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate data
        run: bun run validate

      - name: Lint
        run: bun run lint

  # ── Build ──────────────────────────────────────────────────────────────────
  # Skipped for fork PRs — they cannot access repository secrets, and the
  # Next.js build queries the database at build time (sitemap generation).
  # All first-party branches and PRs from this repo run the full build.
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
