# CI — Pull Request Checks
#
# Runs on every pull request and on pushes to any branch except main.
# Steps in order:
#   1. Validate provider JSON data (bun run validate)
#   2. Lint source code (bun run lint)
#   3. Build the Next.js app (bun run build)
#
# No secrets required — all steps are purely static/local.

name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Validate · Lint · Build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Bun ───────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Install dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Validate provider JSON data ───────────────────────────────────────────
      - name: Validate data
        run: bun run validate

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: Lint
        run: bun run lint

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: bun run build
        env:
          # Next.js build requires a DATABASE_URL even if no DB queries run at
          # build time (Drizzle imports are statically analysed). Use a dummy
          # postgres URL so the build does not error on a missing env var.
          # Replace with a real dev DB secret if the build actually queries the DB.
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV || 'postgresql://ci:ci@localhost:5432/ci' }}
