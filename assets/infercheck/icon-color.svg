<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="ic-icon-color-title">
  <title id="ic-icon-color-title">InferCheck Icon</title>

  <!-- Rounded square background (accent) -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#1d4ed8"/>

  <!-- Lens fill (accent-hover, darker) -->
  <circle cx="44" cy="42" r="24" fill="#1e3a8a" fill-opacity="0.5"/>

  <!-- Magnifier ring -->
  <circle cx="44" cy="42" r="24" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- Handle -->
  <line x1="62" y1="60" x2="76" y2="74"
    stroke="#ffffff" stroke-width="6"
    stroke-linecap="round"/>

  <!-- 5 tiny stars, r=14 ring from (44,42) -->
  <polygon points="44,25 44.9,27.6 47.8,27.6 45.6,29.2 46.5,31.8 44,30.2 41.5,31.8 42.4,29.2 40.2,27.6 43.1,27.6" fill="#FCD34D"/>
  <polygon points="57.3,30.7 58.2,33.3 61.1,33.3 58.9,34.9 59.8,37.5 57.3,35.9 54.8,37.5 55.7,34.9 53.5,33.3 56.4,33.3" fill="#FCD34D"/>
  <polygon points="53.3,50.4 54.2,53 57.1,53 54.9,54.6 55.8,57.2 53.3,55.6 50.8,57.2 51.7,54.6 49.5,53 52.4,53" fill="#FCD34D"/>
  <polygon points="34.7,50.4 35.6,53 38.5,53 36.3,54.6 37.2,57.2 34.7,55.6 32.2,57.2 33.1,54.6 30.9,53 33.8,53" fill="#FCD34D"/>
  <polygon points="30.7,30.7 31.6,33.3 34.5,33.3 32.3,34.9 33.2,37.5 30.7,35.9 28.2,37.5 29.1,34.9 26.9,33.3 29.8,33.3" fill="#FCD34D"/>

  <!-- Tick (compliant green, bright enough on dark) -->
  <polyline points="32,42 41,52 58,28"
    fill="none" stroke="#4ade80" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
