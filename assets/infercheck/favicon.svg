<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="ic-favicon-title">
  <title id="ic-favicon-title">InferCheck</title>

  <!-- Background (accent) -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="#1d4ed8"/>

  <!-- Magnifier ring -->
  <circle cx="13" cy="13" r="8" fill="none" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Handle -->
  <line x1="19" y1="19" x2="25" y2="25"
    stroke="#ffffff" stroke-width="3"
    stroke-linecap="round"/>

  <!-- Tick (compliant green, bright) -->
  <polyline points="9,13 12,17 18,8"
    fill="none" stroke="#4ade80" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
